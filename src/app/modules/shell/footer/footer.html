<footer class=" footer-bg" [style.--bg-desktop]="'url(' + background1920x1080 + ')'"
    [style.--bg-large]="'url(' + background2440x1800 + ')'" [style.--bg-mobile]="'url(' + backgroundMobile + ')'">
    <div class="footer-capsule" data-aos="fade-left">
        <div class="footer-logo">
            <img src="/footer/LOGO-COLOR.png" alt="Innova">
        </div>

        <div class="footer-socials">
            <a href="mailto:info@innovatrials.com" class="social-btn">
                <img src="/footer/01_INNOVATRIALS_BOTON01.png" alt="Email">
            </a>
            <a href="tel:+17863511786" class="social-btn">
                <img src="/footer/01_INNOVATRIALS_BOTON02.png" alt="Phone: +1-(786)-351-1786">
            </a>
            <a href="https://www.google.com/maps/search/?api=1&query=104+Crandon+Blvd+Suite+312+Key+Biscayne+FL+33149"
                target="_blank" class="social-btn">
                <img src="/footer/01_INNOVATRIALS_BOTON03.png" alt="Location">
            </a>
            <a href="https://www.linkedin.com/company/innova-trials/" target="_blank" class="social-btn">
                <img src="/footer/01_INNOVATRIALS_BOTON04.png" alt="LinkedIn">
            </a>
            <a href="https://www.instagram.com/innovatrials/" target="_blank" class="social-btn">
                <img src="/footer/01_INNOVATRIALS_BOTON05.png" alt="Instagram">
            </a>
            <a routerLink="/join-our-team" class="join-team-btn">
                JOIN OUR TEAM
            </a>
        </div>

        <div class="footer-map">
            <img src="./footer/mapa-animado.gif" alt="Map">
        </div>
    </div>
</footer>
